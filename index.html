<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Roçagem e Poda</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<header>
<img src="logo.jpg" class="logo">
<h2>Roçagem e Poda</h2>
<p class="sub">Orçamento rápido e automático</p>
</header>

<div class="card">

<div class="title">Dados do cliente</div>

<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">

</div>

<div class="card">

<div class="title">Detalhes do serviço</div>

<select id="tipo">
<option value="1">Terreno leve</option>
<option value="2">Médio</option>
<option value="3">Pesado</option>
</select>

<textarea id="descricao" placeholder="Descreva o local"></textarea>

<input type="file" id="foto" accept="image/*">

<div class="card">
  <div class="title">Resumo do orçamento</div>
  <p id="valorPreview">Valor: R$ 0</p>
</div>

<button class="btn-pulsando" onclick="enviar()">🚀 QUERO ORÇAMENTO AGORA</button>

<button onclick="enviar()">Solicitar orçamento no WhatsApp</button>

</div>

<script src="script.js"></script>

</body>
</html>
