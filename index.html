<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roçagem e Poda</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="header" style="background-color: #2ecc71; padding: 20px; text-align: center; border-radius: 10px; margin-bottom: 20px;">
            <h2>Roçagem e Poda</h2>
            <p>Orçamento rápido e automático</p>
        </div>

        <div class="card">
            <div class="title">Dados do cliente</div>
            <input type="text" id="nome" placeholder="Nome">
            <input type="text" id="telefone" placeholder="Telefone">
            <input type="text" id="endereco" placeholder="Endereço">
        </div>

        <div class="card">
            <div class="title">Detalhes do serviço</div>
            <select id="tipo">
                <option value="Terreno leve">Terreno leve</option>
                <option value="Médio">Terreno médio</option>
                <option value="Pesado">Terreno pesado</option>
            </select>

            <textarea id="descricao" placeholder="Descreva o local"></textarea>
            <input type="type" id="foto" accept="image/*" style="display:none;"> 
        </div>

        <div class="card">
            <div class="title">Resumo do orçamento</div>
            <p id="valorPreview">Valor: R$ 0</p>
        </div>

        <button class="btn-pulsando" onclick="enviar()">🚀 QUERO ORÇAMENTO AGORA</button>
        <button onclick="enviar()">Solicitar orçamento no WhatsApp</button>

    </div>

    <script src="script.js"></script>
</body>
</html>
